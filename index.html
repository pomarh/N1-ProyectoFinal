<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/vite.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,200..1000;1,200..1000&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
            rel="stylesheet" />

        <link rel="stylesheet" href="./src/styles/input.css" />
        <script type="module" src="./src/scripts/main.js" defer></script>
        <script type="module" src="./src/scripts/stays.js" defer></script>
        <script type="module" src="./src/scripts/utils.js" defer></script>
        <title>n1proyecto-final</title>
    </head>
    <body class="bg-gray-100 md:p-5 lg:px-10 font-mulish">
        <header class="w-12/12 h-32 md:-my-5 lg:mt-5 lg:h-20 static">
            <nav class="h-32 w-[80%] m-auto flex flex-col md:w-12/12 md:flex md:flex-row md:justify-between md:items-center md:px-5 lg:h-15">
                <div class="h-16 flex items-center -ml-1">
                    <img class="md:w-25 lg:w-30" src="./src/img/icons/logo-f7862584.svg" alt="" />
                </div>
                <div
                    class="h-12 w-12/12 flex justify-betweenv items-center text-[13px] border border-gray-200 shadow-lg rounded-2xl md:w-[35%] lg:w-[33%] lg:h-13">
                    <span
                        class="w-2/5 h-12 flex items-center justify-center text-center text-darkGray border-r border-r-gray-200 lg:text-[15px] lg:h-13"
                        >add location</span
                    >
                    <span
                        class="w-2/5 h-12 flex items-center justify-center text-center text-darkGray border-r border-r-gray-200 lg:text-[15px] lg:h-13"
                        >add guests</span
                    >
                    <button id="llamarModal" class="w-[20%] h-12">
                        <img class="w-4 h-4 m-auto text-red-400" src="./src/img/icons/search.svg" alt="" />
                    </button>
                </div>
            </nav>
            <div id="modal" class="w-12/12 h-dvh bg-gray-500/40 absolute top-0 left-0 hidden">
                <div class="w-12/12 h-[80%] lg:h-3/5 bg-white flex flex-col lg:items-start lg:px-50 static">
                    <div class="w-11/12 h-12 flex justify-between items-center mx-5">
                        <p>Edit your search</p>
                        <button id="cerrarModal" class="text-3xl">x</button>
                    </div>
                    <div
                        class="m-5 border border-gray-200 shadow-lg rounded-2xl flex flex-col md:w-[70%] md:mx-auto lg:flex lg:flex-row lg:justify-between lg:w-12/12">
                        <div class="w-12/12 h-12 mb-3 md:mb-0 lg:border-r lg:border-r-gray-200">
                            <input
                                id="buscarLocation"
                                class="w-12/12 h-11 text-center text-darkGray border-r-gray-200 rounded-2xl lg:text-[15px] lg:h-13"
                                type="text"
                                placeholder="add location" />

                            <div id="menuLocation" class="hidden m-5 mt-25 lg:mt-5">
                                <ul id="opcCiudades">
                                    <li class="listaCiudad">Helsinki, Findland</li>
                                    <li class="listaCiudad">Turku, Finland</li>
                                    <li class="listaCiudad">Oulu, Finland</li>
                                    <li class="listaCiudad">Vaasa, Finland</li>
                                </ul>
                            </div>
                        </div>
                        <div class="w-12/12 h-11 lg:border-r lg:border-r-gray-200">
                            <input
                                id="buscarGuests"
                                class="w-12/12 h-12 text-center text-darkGray border-r-gray-200 rounded-2xl lg:text-[15px] lg:h-13"
                                type="number"
                                placeholder="add guests" />

                            <div id="menuGuests" class="hidden">
                                <div class="w-2/5 md:w-1/4 lg:w-2/5 m-5">
                                    <p>Adults</p>
                                    <p class="mb-2 text-lightGray text-[13px]">Ages 13 or above</p>
                                    <div class="flex justify-between items-center w-12/12">
                                        <button
                                            id="btnMenosAdultos"
                                            class="w-5 h-5 text-center flex items-center justify-center border border-gray-400 bg-gray-200 rounded-[3px]">
                                            -
                                        </button>
                                        <span id="resAdulto">0</span>
                                        <button
                                            id="btnMasAdultos"
                                            class="w-5 h-5 text-center flex items-center justify-center border border-gray-400 bg-gray-200 rounded-[3px]">
                                            +
                                        </button>
                                    </div>
                                </div>
                                <div class="w-2/5 md:w-1/4 lg:w-2/5 m-5">
                                    <p>Children</p>
                                    <p class="mb-2 text-lightGray text-[13px]">Ages 2-12</p>
                                    <div class="flex justify-between items-center">
                                        <button
                                            id="btnMenosNinios"
                                            class="w-5 h-5 text-center flex items-center justify-center border border-gray-400 bg-gray-200 rounded-[3px]">
                                            -
                                        </button>
                                        <span id="resNinios">0</span>
                                        <button
                                            id="btnMasNinios"
                                            class="w-5 h-5 text-center flex items-center justify-center border border-gray-400 bg-gray-200 rounded-[3px]">
                                            +
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <button
                            id="btnSearch"
                            class="w-30 md:w-50 m-auto h-9 bg-salmon rounded-2xl flex justify-center items-center gap-2 absolute bottom-50 left-35 md:left-70 lg:static lg:mx-10 lg:w-80">
                            <img class="w-4 h-4" src="./src/img/icons/searchboton.svg" alt="" />
                            <p class="text-white">search</p>
                        </button>
                    </div>
                </div>
            </div>
        </header>
        <main class="px-7 md:px-15">
            <blockquote class="h-20 flex justify-between items-center text-dark md:-mx-7">
                <h1 class="text-2xl font-semibold capitalize md:text-[26px]">stays in finland</h1>
                <div>
                    <p class="text-[14px] md:text-md"><span>12</span>+<span class="pl-1">stays</span></p>
                </div>
            </blockquote>
            <blockquote id="cargarStays" class="w-12/12 grid grid-cols-1 md:grid md:grid-cols-2 md:gap-8 lg:grid lg:grid-cols-3 lg:gap-12">
                <!-- agregado por script -->
            </blockquote>
        </main>

        <footer class="text-center text-[12px] mt-5">
            <p class="text-lightGray my-2 md:pt-1 lg:pt-3">
                created by
                <span class="text-darkGray">&copy;lostgiljouney</span> - dev Henry Poma Rojas
            </p>
        </footer>
    </body>
</html>
